name: NEBULA-BOT 24/7

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */4 * * *' # إعادة تشغيل كل 4 ساعات
  workflow_dispatch: # يتيح لك التشغيل يدوياً

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install mineflayer
        
      - name: Start NEBULA-BOT
        run: node index.js
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
