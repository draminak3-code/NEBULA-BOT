name: NEBULA-BOT 24/7

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608
      
      - name: Setup Node.js
        uses: actions/setup-node@60edb5dd545a775178f5252478337817473d22d1
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install mineflayer
        
      - name: Start NEBULA-BOT
        run: node index.js
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
